# ============================================================================
# NarraNexus local development Docker services
# ============================================================================
# MySQL      — 主数据库
# Synapse    — Matrix homeserver（NexusMatrix 的底层依赖）
# EverMemOS  — 在 .evermemos/docker-compose.yaml（独立管理）
# ============================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: xyz-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: xyz_root_pass
      MYSQL_DATABASE: xyz_agent_context
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pxyz_root_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: nexus-synapse
    restart: unless-stopped
    volumes:
      - ./deploy/synapse/data:/data
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://localhost:8008/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
    driver: local
