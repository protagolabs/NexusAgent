# Synapse homeserver configuration template for NarraNexus
# This file is copied to deploy/synapse/data/ on first launch.
# Signing key is auto-generated by Synapse on first start.

server_name: "localhost"
pid_file: /data/homeserver.pid
listeners:
  - port: 8008
    resources:
    - compress: false
      names:
      - client
      - federation
    tls: false
    type: http
    x_forwarded: true
database:
  name: sqlite3
  args:
    database: /data/homeserver.db
log_config: "/data/localhost.log.config"
media_store_path: /data/media_store
registration_shared_secret: "9_HimzS2a&CBS^DPyP&mLBT2Nry-e-tR=39.w&jkwf9IGkOCGH"
report_stats: false
macaroon_secret_key: "W_*l@Ay~yNSlZ=UZ8ncz53f-Pzp^uR+H_ph,:ZO_d2@uPZfg,K"
form_secret: "B;eVcv@N^,:ozF8v-2XD0mcnPvWoJ4L_u4M7^vbWw_jnov.WwH"
signing_key_path: "/data/localhost.signing.key"
trusted_key_servers:
  - server_name: "matrix.org"

# ── NexusMatrix customizations ──

# Relax rate limits for high-frequency Agent operations
rc_message:
  per_second: 100
  burst_count: 200

rc_registration:
  per_second: 10
  burst_count: 50

rc_login:
  address:
    per_second: 10
    burst_count: 50
  account:
    per_second: 10
    burst_count: 50

# User search
user_directory:
  enabled: true
  search_all_users: true

# Disable URL preview (Agents don't need it)
url_preview_enabled: false
