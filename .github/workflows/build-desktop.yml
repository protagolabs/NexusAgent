name: Build Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Download standalone Python
        run: |
          mkdir -p tauri/src-tauri/resources/python
          curl -L -o python.tar.gz \
            "https://github.com/astral-sh/python-build-standalone/releases/download/20260325/cpython-3.13.12%2B20260325-aarch64-apple-darwin-install_only.tar.gz"
          tar xzf python.tar.gz -C tauri/src-tauri/resources/python --strip-components=1
          rm python.tar.gz

      - name: Install Python dependencies (no venv, direct into standalone)
        run: |
          tauri/src-tauri/resources/python/bin/python3 -m pip install --no-cache-dir -e .

      - name: Copy project source to resources
        run: |
          mkdir -p tauri/src-tauri/resources/project
          rsync -a --exclude='node_modules' --exclude='.venv' --exclude='.git' \
            --exclude='desktop' --exclude='tauri' --exclude='__pycache__' \
            --exclude='*.pyc' --exclude='.env' --exclude='logs' \
            --exclude='.claude' --exclude='.codex' \
            . tauri/src-tauri/resources/project/

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (signed + notarized)
        run: cd tauri && cargo tauri build
        env:
          CI: true
          # Tauri's macOS bundler reads these env vars to:
          #   1. import the .p12 into a temp keychain
          #   2. codesign with Developer ID
          #   3. submit to Apple notary service and staple the ticket
          # Configure these as GitHub Repository Secrets (Settings →
          # Secrets and variables → Actions). If any are missing the
          # build falls back to ad-hoc unsigned and notarization is skipped.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Normalize artifact filenames (stable name across versions)
        run: |
          set -euo pipefail
          DMG_DIR="tauri/src-tauri/target/release/bundle/dmg"
          APP_DIR="tauri/src-tauri/target/release/bundle/macos"
          mkdir -p dist
          cp "$DMG_DIR"/*.dmg   dist/NarraNexus.dmg
          cp "$APP_DIR"/*.app.tar.gz dist/NarraNexus.app.tar.gz
          ls -la dist

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/NarraNexus.dmg
            dist/NarraNexus.app.tar.gz
          tag_name: ${{ github.ref_name }}
          name: 'NarraNexus ${{ github.ref_name }}'
          body: |
            Signed and notarized macOS build for Apple Silicon.
            Drag NarraNexus.app to /Applications and double-click — no Gatekeeper bypass needed.
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
